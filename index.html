        /* NEW OPTIMIZED BUTTON ANIMATIONS */
        
        /* 1. Super Shine: Moves across swiftly, then waits. GPU optimized. */
        @keyframes super-shine {
          0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }

        }
        .animate-super-shine {
            animation: super-shine 3.5s ease-out infinite;
        }

        @keyframes electric-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
